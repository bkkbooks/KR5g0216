front:
  text: 洞玄靈寳二十四生圖經亦二三部八景自然神真大運告期赤明開光三景朗煥五刼始分元始天尊與十方大聖至真尊神無極太上大道君飛天神人玄和玉女無鞅之衆同坐南浮洞陽上館栢陵舍中清談虚泊素語自然靈音十合妙唱明真諸天歡樂日月停輪星宿黙度九天徊關河海靜波山嶽吞煙龍麟涌躍人神歡焉是時太上無極道君稽首作禮上白天尊今日侍座太漠開昏無極世界一切見明法音遐振澤被十方過泰因縁刼刼化生輪轉聖位任居總真方當胤御剖判六天考刼理運料度種民推筭長夜檢實三官役勞任重歡戚難言敢附靈風自響披心前與元始天王俱於長桑碧林園中聞天尊普告大聖尊神云洞玄天文靈寳玉奧有三部八景神二十四圖上應二十四真中部二十四炁下鎮二十四生靈章璀璨妙絶空洞覩之者九天書名金簡記録生死得仙來運當促三五傷喪萬兆短命流曵八難風刀痛體五苦備嬰淪於長夜不覩三光無知受對任運生死撫之傷襟痛感人神今大慈道行惠澤普隆㐲願天尊有以哀矜直攄玄科教所未聞使未見者見未成者成福流一切億刼得恩如蒙訓授輙當承神鼓風因流揚波清蕩三界肅檢衆魔部正六天馘斬羣邪安國育民使隂陽寧休明化既興道暢太虚於是天尊仰面含𥬇有青黄赤三色之炁從口中而出光明徹照十方内外無幽無𨼆一刼曉明金書紫字玉文丹章文彩煥爛在三炁之中三八景神二十四真各從千乘萬騎在空玄之上輔衛靈文諸天日月流灑華光衆津交灌飛香八纒萬聖稱慶一時禮真天尊告曰今生一切歡樂難譬傾心露藴情無遺𨼆當依玄科七寳鎮靈黄金爲壇授子神真之道道尊法重四萬刼一行下世度人祕則真降泄則禍臻金以相告明識之焉太上道君欣喜歡歎唯北向而立聽命天尊登命九光太真十方飛天侍經玉郎披九光玉藴出金書紫字玉文丹章三部八景二十四圖盛以白玉立空之案九色之巾雲精空結飛文錦蓋懸覆經上諸天大聖無極天尊飛天神王三天真人同時監盟燒香散華誦詠靈章旋行宫城繞經三周一依舊典俯仰之格自然威儀付度道君法事粗畢三景復位衆真退席是時赤明天中是男是女莫不範德歸心信向皆得度世上皇元年九月二日後聖李君出㳺西河歴觀八門值元始天王乘八景玉輿駕九色玄龍三素飛雲𨗳從羣仙手把華幡獅子白鶴嘯歌邕邕浮空而來同㑹西河之上李君稽首請問天王昔蒙訓授天書玉字二十四圖雖得其文未究妙章雖有圖讃而無其像修之菴藹妙理難詳今遇天尊喜慶難言願垂成就極其道真於是天王口吐洞玄内觀玉符以授於君使清齋千日五香熏體東向服符子形神備見自當洞逹諸疑頓了李君稽首奉承教㫖具依天儀長齋千日東向服符三八景神並見身中金書玉字二十四圖空中而明文彩光鮮洞徹無窮羅縷自然是時即命主圖上仙而畫圖焉金書紫字玉文丹章於此成音自南極上元九光太真王夫人東西二華南北真公五嶽神仙清虚真人所受真文並是後聖所書圖像而各係之焉
