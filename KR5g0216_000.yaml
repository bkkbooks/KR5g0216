body:
  text: 真人沐浴東井圖上部第一真氣天河灌東井石景水母精圎光拂靈曜玄輝應髙明元始披長夜天人逐月生沐浴蘭池上龍負長綆瓶金童灑香華玉女流五星冠帶灌玉津錬度五仙形體香萬神降乘景登髙明神仙五嶽真形圖上部第二真氣妙哉元始道五靈敷真文上開龍漢劫煥爛三景分十部飛天書安鎮五帝神靈嶽承玄宫鬱勃吐寶雲上有不死氣植牙練五仙玉芝玄中渙體潔自然熏精思髙靈降交遊上帝君通靈訣精八史圖上部第三真氣三景吐靈華晃朗八門開中有智慧神被服飛天衣八史通靈氣玉符洞精微寶雲映玉字巨獸振天威煥爛八㑹宫紛紛靈人飛精思招真氣五符生光輝八景茦玉輿登空入紫微神仙六甲通靈圖上部第四真氣靈宫飛天女六真宴常湯抱日負明月仰躡三晨光通靈究幽微洞觀朗十方招致自然廚五芝六府昌變化錬萬神分形攺正容乘虛步玄都髙奔入空洞時降金霄人徉襟三素房携契茦飛蓋逍遙升玉京神仙九宫紫房圖上部第五真氣紫房映髙清宫室互相扶香煙繞日月飛天翳太虛至真大聖衆蕭條流羽書開度諸天劫塵沙始一周九五固靈運長保天地居精思安能逺紫宫生我軀元始太清圖上部第六真氣太清無邉際青氣鬱紫微靈風迅七寶琳樹何萋萋紫鳳鳴長條龍麟交橫馳太上觀十方諸天整法衣旋行繞宫城三周長夜開若能思靈氣自得乘景飛神仙真道混成圖上部第七真氣蕩蕩元始初混沌氣未分三色無中化回合若景雲幽冥生真景煥落敷靈文豁朗開長夜植立天地根自然妙真氣淳淳氣常存運通大九界開度諸天門神仙西升保録圖上部第八真氣乘運迅靈氣駕景升西宫之造玉郍國萬乘來相從神魔稽首伏天王並歸降分金範正法世恭道德王故施正真氣别號度一方是時有道世稱曰福德堂靈寶神仙圖曰上部八真神圖以洞天元始之氣化生自然八景上真鎮在人身中上元宫中致上元生氣精心內思八年八真見形千乘萬騎運致景雲載人上升上真一景腦神名覺元子字道都色白一景玉符上元洞天氣部一景神上真二景髮神名玄父華字道衡色玄二景玉符上元洞天氣部二景神上真三景皮膚神名通衆仲字道連色黃三景玉符上元洞天氣部三景神上真四景目神名虛監字道童五色四景玉符上元洞大氣部四景神上真五景頂髓神名靈謨蓋字道周色白五景玉符上元洞天氣部五景神上真六景膂神名益歷轉字道柱白玉色六景玉符上元洞天氣部六景神上真七景鼻神名仲龍王字道徾青黃白三色七景玉符上元洞天氣部七景神上真八景舌神名始梁峙字道岐色赤八景玉符上元洞天氣部八景神靈寶神仙圖曰八景神真玉符上元洞天自然之氣以部上部八景神真鎮在人身上元宫中服之八年八景見形為已通逹幽微之事洞觀自然坐在立亡降致天仙千乘萬騎雲輿羽蓋白日登晨神仙通微靈化圖中部第一真氣大道妙無像運氣凝髙玄結空自然生靈化表三神朝引五星精中吸日中津夕餐黃月華寢卧煉五仙變景隨空化倐忽立自然神仙耀靈九天圖中部第二真氣簫簫九天氣清澄自髙玄慶雲翳重虛金闕承紫煙中有太極宫道君羅大千青林彌衆梵十方並飛天南陵福德堂四座皆清賔散華慶我願逍遙無波津神仙九變圖中部第三真氣妙化因空感專思通至靈上食九天氣𨗳引五雲精三日練萬神一日九變形脫身逰九域遨戲三界庭乘景望太素靈風回緑軿飛煙繞十絶黃幡召萬靈諸天降羽儀鬱鬱入太清神仙常存圖中部第四真氣默念招幽真專靜神自歸漏盡外應消正氣自夷微積感妙真降六府生光輝玄㑹空相和萬神應響齊八景扶雲蓋煥落迅羽儀載我大梵外逍遙乘空飛神仙守一養身圖中部第五真氣𨗳引九天氣摩手慰身形遏斷邪魔徑瑩飾練光明鳳翔通真氣龍超制萬靈辰旦衆真㑹養身覺神生淡泊還守一靜思正氣庭神備景自飛髙升入上清神仙守神合景圖中部第六真氣泥九置𩲸營中元抱一宫丹田三靈府混合百神王三關統九天呼吸日月光五星奧玄滋流演六胃充靜思萬氣歸神安形亦芳三部八景真携我入太空長居天地劫無始永無終神仙寂默養精守志圖中部第七真氣清朝餐五星專思守泥丸正中咽日光默念絳府熏黃昏𨗳月精灌溉丹田君三真生一景變化形自分一見萬神歸攝氣景髙奔上登日月宫出入觀八門龍漢無終劫妙哉靈寶文芝英玉女圖中部第八真氣飄飄散靈氣芝英隨風回諸天灑香華日月灌靈暉玉女檠金槃粲粲乘空飛仰思真顔降咽芝五神開𨗳引光明徹萬劫體不衰靈寶神仙圖曰中部八景神圖以元始靈寶洞玄之氣化生自然中部八景中真鎮在人身中中元宫中致中元生氣精思八年八真見形千乘萬騎運致神仙羽蓋玉輿飛行太虛中真一景喉神名百流放字道通九色洞玄中元一景真符部一景神中真二景肺神名素靈生字道平色白洞玄中元二景真符部二景神中真三景心神名煥陽昌字道明色赤洞玄中元三景真符部三景神中真四景肝神名開君童字道清色青洞玄中元四景真符部四景神中真五景膳神名龍德拘字道放色青黃緑洞玄中元五景真符部五景神中真六景左腎神名春元真字道卿五色衣洞玄中元六景真符部六景神中真七景右腎神名象他無字道王白黑色洞玄中元七景真符部七景神中真八景脾神名寶無全字道騫正黃色洞玄中元八景真符部八景神靈寶神仙圖曰靈寶洞玄中元八景真符以部中部八景神真鎮在人身中中元宫中服之八年中元八景見形為已通靈逹神洞觀八方神芝玉漿五氣玄芽身生光明神仙秉騎飛行太空神仙六隂玉女圖下部第一真氣靈飛秀太極玉女翠朱瓊𥥆窕飛空出飄飄乘虛生玄妙自然